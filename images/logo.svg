<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Lineup2Playlist logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f9e6b"/>
      <stop offset="1" stop-color="#1d7f9e"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#bg)"/>

  <!-- equalizer bars: the line-up as sound levels -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="24" y="60" width="7" height="22" rx="3.5"/>
    <rect x="35" y="46" width="7" height="36" rx="3.5"/>
    <rect x="46" y="66" width="7" height="16" rx="3.5"/>
  </g>

  <!-- eighth note: the playlist -->
  <g fill="#ffffff">
    <rect x="82" y="34" width="5.5" height="46" rx="2.75"/>
    <path d="M87.5 34 c14 3 15 16 6 24 c6 -9 2 -17 -6 -18 z"/>
    <ellipse cx="73.5" cy="82" rx="11.5" ry="8.5" transform="rotate(-24 73.5 82)"/>
  </g>
</svg>
