<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Lineup2Playlist logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f9e6b"/>
      <stop offset="1" stop-color="#1d7f9e"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#bg)"/>

  <!-- equalizer bars: the line-up as sound levels -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="26" y="60" width="7" height="22" rx="3.5"/>
    <rect x="37" y="44" width="7" height="38" rx="3.5"/>
    <rect x="48" y="66" width="7" height="16" rx="3.5"/>
  </g>

  <!-- play triangle: the playlist -->
  <path d="M72 44 L99 62 L72 80 Z" fill="#ffffff"
        stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
</svg>
