<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Lineup2Playlist logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f9e6b"/>
      <stop offset="1" stop-color="#1d7f9e"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#bg)"/>
  <!-- line-up: a stacked list on the left -->
  <g fill="#ffffff" opacity="0.96">
    <rect x="26" y="38" width="34" height="7" rx="3.5"/>
    <rect x="26" y="56" width="26" height="7" rx="3.5"/>
    <rect x="26" y="74" width="30" height="7" rx="3.5"/>
  </g>
  <!-- arrow: turns the line-up into a playlist -->
  <path d="M64 60 h9" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <!-- play triangle -->
  <path d="M80 42 L98 60 L80 78 Z" fill="#ffffff"/>
</svg>
